// ── COPY (safe, no text in HTML attributes) ───────────────────────────────────
var STORE = {};
var STORE_N = 0;

function storeText(txt) {
  var id = 'k' + (++STORE_N);
  STORE[id] = txt;
  return id;
}

function doCopy(storeId, btnEl) {
  var txt = STORE[storeId];
  if (!txt) return;
  function win() {
    btnEl.textContent = 'Copied!';
    btnEl.classList.add('ok');
    setTimeout(function(){ btnEl.textContent = 'Copy'; btnEl.classList.remove('ok'); }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(win).catch(function(){ fallback(txt, win); });
  } else {
    fallback(txt, win);
  }
}

function fallback(txt, onWin) {
  var el = document.createElement('textarea');
  el.value = txt;
  el.setAttribute('readonly', '');
  el.style.position = 'absolute';
  el.style.left = '-9999px';
  document.body.appendChild(el);
  el.focus();
  el.setSelectionRange(0, el.value.length);
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(el);
  if (ok) onWin();
}

function showScreen(id) {
  ['home','create','image'].forEach(function(s){
    document.getElementById('s-'+s).classList.toggle('active', s===id);
    document.getElementById('n-'+s).classList.toggle('on', s===id);
  });
  window.scrollTo(0,0);
}

// ── PILL BUILDER ─────────────────────────────────────────────────────────────
function makePills(containerId, items, selectedId, colorFn, clickFn) {
  var cont = document.getElementById(containerId);
  cont.innerHTML = '';
  items.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'pill' + (item.id === selectedId ? ' on' : '');
    btn.textContent = (item.e ? item.e + ' ' : '') + item.name;
    var col = colorFn(item);
    if (item.id === selectedId) {
      btn.style.borderColor = col;
      btn.style.backgroundColor = hexAlpha(col, 0.15);
      btn.style.color = col;
    }
    btn.addEventListener('click', function(){ clickFn(item.id); });
    cont.appendChild(btn);
  });
}

function hexAlpha(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

  hdr.appendChild(lbl);
  hdr.appendChild(rside);

  var body = document.createElement('div');
  body.className = 'blk-body';
  body.textContent = text;
  if (!openByDefault) body.style.display = 'none';

  hdr.addEventListener('click', function(){
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    chev.textContent = open ? '▼' : '▲';
  });

  wrap.appendChild(hdr);
  wrap.appendChild(body);
  return wrap;
}

function appendBlock(container, label, text, color, open) {
  if (text) container.appendChild(makeBlock(label, text, color, open));
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
function doGenerate() {
  var eco = ECO[S.eco];
  var pl = PLAT[S.plat];
  var topic = document.getElementById('topic').value.trim();

  var hookPool = (HOOKS[S.eco] && HOOKS[S.eco][S.mood]) || HOOKS.blc.educate;
  var hook = topic ? (topic.charAt(0).toUpperCase()+topic.slice(1)+'.') : rnd(hookPool);
  var cta = rnd(eco.ctas);
  var signoff = rnd(eco.signoffs);

  var scriptSrc = (SCRIPTS[S.plat] && SCRIPTS[S.plat][S.mood]) || SCRIPTS.tiktok.educate;
  var rawScript = rnd(Array.isArray(scriptSrc) ? scriptSrc : [scriptSrc]);
  var script = rawScript.replace(/{HOOK}/g, hook).replace(/{CTA}/g, cta);

  var caption = '';
  if (S.plat === 'threads') {
    caption = script;
  } else if (S.plat === 'instagram') {
    var pts = script.split('CAPTION:');
    caption = pts.length > 1 ? pts[1].trim() : hook+'\n\n'+cta+'\n\n'+signoff;
  } else {
    caption = hook+'\n\n'+cta+'\n\n'+signoff;
  }

  var moodTagKey = {healing:'healing',educate:'education',luxury:'softlife',bold:'core',story:'story',sell:'core'}[S.mood] || 'core';
  var tagPool = (eco.tags.core || []).concat(eco.tags[moodTagKey] || []);
  var tags = pl.maxTags > 0 ? rnds(tagPool, pl.maxTags) : [];
  var fmt = S.fmt || rnd(pl.formats);
  var tip = rnd(TIPS[S.plat] || TIPS.tiktok);

  var scene = rnd(SCENES[S.aes] || SCENES.editorial);
  var imgMain = eco.imgAlts ? rnd(eco.imgAlts) : eco.imgBase + ' — ' + scene + '.';
  var negPrompt = eco.id === 'blc' ? 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, blazer, suit jacket' : eco.id === 'hsl' ? 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, office, desk, pen, notebook, corporate' : 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, business suit, corporate';
  var imgCG = imgMain + ' [ChatGPT/DALL-E: photorealistic portrait, ultra-detailed face, sharp rectangular glasses always on face, lifestyle photography, natural or warm cinematic lighting, magazine quality]';
  var imgOA = imgMain + ' [OpenArt/Krea: Realistic Vision v5 or Juggernaut XL. Negative prompt: ' + negPrompt + '. CFG 7-8. Steps 30+]';
  var imgAnim = rnd(ANIM);

  var fullContent = 'HOOK:\n'+hook+(S.plat!=='threads'?'\n\nSCRIPT:\n'+script:'')+'\n\nCAPTION:\n'+caption+(tags.length?'\n\nHASHTAGS:\n'+tags.map(function(t){return '#'+t;}).join(' '):'')+'\n\nCTA: '+cta;
  var fullImg = 'MAIN PROMPT:\n'+imgMain+'\n\nCHATGPT/DALL-E:\n'+imgCG+'\n\nOPENART/KREA:\n'+imgOA+'\n\nANIMATION:\n'+imgAnim;

  var res = document.getElementById('result');
  res.innerHTML = '';

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'res-hdr';
  hdr.innerHTML = '<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.18em;">Your Content</div><div style="display:flex;gap:6px;"><span class="badge" style="background:'+hexAlpha(eco.color,0.13)+';color:'+eco.color+';">'+eco.short+'</span><span class="badge" style="background:'+hexAlpha(pl.color,0.13)+';color:'+pl.color+';">'+pl.name+'</span></div>';
  res.appendChild(hdr);

  appendBlock(res, 'Hook', hook, eco.color, true);
  if (S.plat !== 'threads') appendBlock(res, 'Script', script, pl.color, false);
  appendBlock(res, S.plat==='threads'?'Post Copy':'Caption', caption, eco.color, true);
  if (tags.length) appendBlock(res, 'Hashtags', tags.map(function(t){return '#'+t;}).join(' '), '#888', true);

  // CTA + Format row
  var row2 = document.createElement('div');
  row2.className = 'row2';
  var ctaBox = document.createElement('div');
  ctaBox.className = 'box2';
  ctaBox.style.cssText = 'background:'+hexAlpha(eco.color,0.08)+';border:1px solid '+hexAlpha(eco.color,0.25)+';';
  ctaBox.innerHTML = '<div class="mini" style="color:'+eco.color+';">CTA</div><div style="font-size:12px;font-weight:600;">→ '+cta+'</div>';
  var fmtBox = document.createElement('div');
  fmtBox.className = 'box2';
  fmtBox.style.cssText = 'background:#111;border:1px solid #1E1E1E;';
  fmtBox.innerHTML = '<div class="mini" style="color:#555;">Format</div><div style="font-size:12px;color:#888;">'+fmt+'</div>';
  row2.appendChild(ctaBox);
  row2.appendChild(fmtBox);
  res.appendChild(row2);

  // Image section
  var imgSec = document.createElement('div');
  imgSec.className = 'img-sec';

  var fiSid = storeText(fullImg);
  var imgHdr = document.createElement('div');
  imgHdr.className = 'img-hdr';

  var imgHdrLeft = document.createElement('div');
  imgHdrLeft.style.cssText = 'display:flex;align-items:center;gap:8px;';
  imgHdrLeft.innerHTML = '<span style="font-size:15px;">🎨</span><span style="font-size:10px;color:#A07BC8;text-transform:uppercase;letter-spacing:.15em;font-weight:600;">Image &amp; Animation Prompts</span>';

  var imgHdrRight = document.createElement('div');
  imgHdrRight.style.cssText = 'display:flex;gap:8px;align-items:center;';
  var fiCpBtn = document.createElement('button');
  fiCpBtn.className = 'cp-btn';
  fiCpBtn.textContent = 'Copy All';
  fiCpBtn.addEventListener('click', function(ev){ ev.stopPropagation(); doCopy(fiSid, fiCpBtn); });
  var imgChev = document.createElement('span');
  imgChev.style.cssText = 'color:#444;font-size:11px;';
  imgChev.textContent = '▼';
  imgHdrRight.appendChild(fiCpBtn);
  imgHdrRight.appendChild(imgChev);
  imgHdr.appendChild(imgHdrLeft);
  imgHdr.appendChild(imgHdrRight);

  var imgBody = document.createElement('div');
  imgBody.style.cssText = 'display:none;padding:0 14px 14px;';
  appendBlock(imgBody, 'Main Prompt — Flow / General', imgMain, '#A07BC8', true);
  appendBlock(imgBody, 'ChatGPT / DALL-E', imgCG, '#10A37F', false);
  appendBlock(imgBody, 'OpenArt / Krea', imgOA, '#F77737', false);
  appendBlock(imgBody, 'Animation / Video', imgAnim, '#C8A951', false);

  imgHdr.addEventListener('click', function(){
    var open = imgBody.style.display !== 'none';
    imgBody.style.display = open ? 'none' : 'block';
    imgChev.textContent = open ? '▼' : '▲';
  });

  imgSec.appendChild(imgHdr);
  imgSec.appendChild(imgBody);
  res.appendChild(imgSec);

  // Tip
  var tipBox = document.createElement('div');
  tipBox.className = 'tip-box';
  tipBox.innerHTML = '<div class="mini" style="color:#444;">Posting Tip</div><div style="font-size:12px;color:#666;line-height:1.6;">'+tip+'</div>';
  res.appendChild(tipBox);

  // Full copy button
  var fcSid = storeText(fullContent);
  var fcBtn = document.createElement('button');
  fcBtn.className = 'big-cp';
  fcBtn.textContent = 'Copy Full Content Package';
  fcBtn.addEventListener('click', function(){ doCopy(fcSid, fcBtn); });
  res.appendChild(fcBtn);

  res.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── GENERATE IMAGE ────────────────────────────────────────────────────────────
function doGenImg() {
  var eco = ECO[S.iEco];
  var customScene = document.getElementById('img-scene').value.trim();
  var scene = customScene || rnd(SCENES[S.iAes] || SCENES.editorial);
  var imgMain = eco.imgAlts ? rnd(eco.imgAlts) : eco.imgBase + ' — ' + scene + '.';
  var negPrompt = eco.id === 'blc' ? 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, blazer, suit jacket' : eco.id === 'hsl' ? 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, office, desk, pen, notebook, corporate' : 'no glasses, glasses removed, blurry, cartoon, anime, distorted, frizzy hair, business suit, corporate';
  var imgCG = imgMain + ' [ChatGPT/DALL-E: photorealistic portrait, ultra-detailed face, sharp rectangular glasses always on face, lifestyle photography, natural or warm cinematic lighting, magazine quality]';
  var imgOA = imgMain + ' [OpenArt/Krea: Realistic Vision v5 or Juggernaut XL. Negative prompt: ' + negPrompt + '. CFG 7-8. Steps 30+]';
  var imgAnim = rnd(ANIM);
  var fullImg = 'MAIN PROMPT:\n'+imgMain+'\n\nCHATGPT/DALL-E:\n'+imgCG+'\n\nOPENART/KREA:\n'+imgOA+'\n\nANIMATION:\n'+imgAnim;

  var res = document.getElementById('img-result');
  res.innerHTML = '';

  var lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.18em;margin-top:28px;margin-bottom:14px;';
  lbl.textContent = 'Your Prompts';
  res.appendChild(lbl);

  appendBlock(res, 'Main Prompt — Flow / General', imgMain, '#A07BC8', true);
  appendBlock(res, 'ChatGPT / DALL-E', imgCG, '#10A37F', false);
  appendBlock(res, 'OpenArt / Krea', imgOA, '#F77737', false);
  appendBlock(res, 'Animation / Video', imgAnim, '#C8A951', false);

  var allSid = storeText(fullImg);
  var allBtn = document.createElement('button');
  allBtn.className = 'big-cp';
  allBtn.style.marginTop = '12px';
  allBtn.textContent = 'Copy All Prompts';
  allBtn.addEventListener('click', function(){ doCopy(allSid, allBtn); });
  res.appendChild(allBtn);

  res.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── WIRE UP ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('n-home').addEventListener('click', function(){ showScreen('home'); });
  document.getElementById('n-create').addEventListener('click', function(){ showScreen('create'); buildCreate(); });
  document.getElementById('n-image').addEventListener('click', function(){ showScreen('image'); buildImgScreen(); });
  document.getElementById('back-create').addEventListener('click', function(){ showScreen('home'); });
  document.getElementById('back-image').addEventListener('click', function(){ showScreen('home'); });
  document.getElementById('home-img-btn').addEventListener('click', function(){ showScreen('image'); buildImgScreen(); });
  document.getElementById('gen-btn').addEventListener('click', doGenerate);
  document.getElementById('gen-img-btn').addEventListener('click', doGenImg);
  buildHome();
  buildCreate();
  buildImgScreen();
});
</script>
</body>
</html>
